<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
   <div class="container">
        <a class="navbar-brand" href="#">Dating App</a>             
        
        <ul *ngIf="currentUser$ | async" class="navbar-nav me-auto mb-2 mb-md-0">
            <li class="nav-item"> 
                <a class="nav-link active" href="#">Matches</a> 
            </li>
            <li class="nav-item"> 
                <a class="nav-link" href="#">Lists</a> 
            </li>
            <li class="nav-item"> 
                <a class="nav-link" href="#">Messages</a> 
            </li>            
        </ul>

        <div *ngIf="currentUser$ | async" class="dropdown" dropdown>
            <a class="dropdown-toggle text-light text-decoration-none" dropdownToggle>Welcome user</a>
            <div class="dropdown-menu" *dropdownMenu>
                <a class="dropdown-item">Edit Profile</a>
                <a (click)="logout()" class="dropdown-item">Logout</a>
            </div>
        </div>

        <form *ngIf="!(currentUser$ | async)" #loginForm="ngForm" (ngSubmit)="login()" autocomplete="off" class="d-flex">
            <input name="username" [(ngModel)]="model.username" class="form-control me-2" type="text" placeholder="Username">
            <input name="password" [(ngModel)]="model.password" class="form-control me-2" type="password" placeholder="Password"> 
            <button class="btn btn-outline-success" type="submit">Login</button> 
        </form>
   </div>
