<nav class="navbar navbar-expand-md navbar-dark fixed-top bg-primary">
   <div class="container">
        <a routerLink="/" routerLinkActive="active" class="navbar-brand" href="#">Dating App</a>             
        
        <ul class="navbar-nav me-auto mb-2 mb-md-0">
            <ng-container *ngIf="currentUser$ | async">
                <li class="nav-item"> 
                    <a routerLink="/members" routerLinkActive="active" class="nav-link" href="#">Matches</a> 
                </li>
                <li class="nav-item"> 
                    <a routerLink="/lists" routerLinkActive="active" class="nav-link" href="#">Lists</a> 
                </li>
                <li class="nav-item"> 
                    <a routerLink="/messages" routerLinkActive="active" class="nav-link" href="#">Messages</a> 
                </li>            
            </ng-container>
            <li class="nav-item"> 
                <a routerLink="/errors" routerLinkActive="active" class="nav-link" href="#">Errors</a> 
            </li>            
        </ul>

        <div *ngIf="(currentUser$ | async) as user" class="dropdown" dropdown>
            <a class="dropdown-toggle text-light text-decoration-none" dropdownToggle>Welcome {{ user.username | titlecase }}</a>
            <div class="dropdown-menu" *dropdownMenu>
                <a class="dropdown-item">Edit Profile</a>
                <a (click)="logout()" class="dropdown-item">Logout</a>
            </div>
        </div>

        <form *ngIf="!(currentUser$ | async)" #loginForm="ngForm" (ngSubmit)="login()" autocomplete="off" class="d-flex">
            <input name="username" [(ngModel)]="model.username" class="form-control me-2" type="text" placeholder="Username">
            <input name="password" [(ngModel)]="model.password" class="form-control me-2" type="password" placeholder="Password"> 
            <button class="btn btn-success" type="submit">Login</button> 
        </form>
   </div>
</nav>
