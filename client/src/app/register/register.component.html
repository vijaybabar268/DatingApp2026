<form #registerForm="ngForm" (ngSubmit)="register()" autocomplete="off">
    <h2 class="text-center text-primary">Sign up</h2>
    <hr/>
    <div class="form-group mb-3">
        <input name="username" [(ngModel)]="model.username" placeholder="Username" type="text" 
            class="form-control">
    </div>

    <div class="form-group mb-3">
        <label>Who is your favorite user?</label>        
        <select class="form-select" name="favoriteUsername" [(ngModel)]="model.favoriteUsername">
            <option *ngFor="let user of usersFromHomeComponent" [value]="user.userName">{{ user.userName }}</option>
        </select>
    </div>

    <div class="form-group mb-3">
        <input name="password" [(ngModel)]="model.password" placeholder="Password" type="password" 
            class="form-control">
    </div>

    <div class="text-center">
        <button type="submit" class="btn btn-success me-2">Register</button>
        <button (click)="cancel()" type="button" class="btn btn-default">Cancel</button>
    </div>
</form>
